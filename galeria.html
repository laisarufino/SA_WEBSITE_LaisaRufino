<figure>
    <main>
      <div class="card-group">
        <div class="card">
          <img src="./images/cenário.jpg" class="card-img-top" alt="..." height="250" />
          <div class="card-body">
            <h5 class="card-title">Show ao vivo</h5>
            <p class="card-text">
              Uma multidão vibrante acompanha um show eletrizante, com luzes intensas e efeitos visuais que criam uma atmosfera imersiva. O palco iluminado destaca os artistas enquanto o público vive a energia única da música ao vivo.
            </p>
          </div>
        </div>
        <div class="card">
          <img src="./images/palco.webp" class="card-img-top" alt="..." height="250" />
          <div class="card-body">
            <h5 class="card-title">Palco e iluminação </h5>
            <p class="card-text">
              Um palco moderno equipado com iluminação profissional e feixes de luz que atravessam o ambiente, criando um espetáculo visual impressionante. O espaço transmite a sensação de um grande evento pronto para apresentações inesquecíveis.
            </p>
          </div>
        </div>
        <div class="card">
          <img src="./images/praça.avif" class="card-img-top" alt="..." height="250" />
          <div class="card-body">
            <h5 class="card-title">Áreas de convivência</h5>
            <p class="card-text">
              Um ambiente ao ar livre aconchegante, com mesas, luzes decorativas e natureza ao redor. Ideal para relaxar, socializar e aproveitar momentos agradáveis entre um show e outro.
            </p>
          </div>
        </div>
    </main>
